name: Build and Push Docker Image

on:
  release:
    types:
      - created

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build scraper
        uses: docker/build-push-action@v5
        with:
          context: ./scraper
          push: true
          load: true
          tags: ghcr.io/MathisBurger/bundestag-explore-scraper:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build import
        uses: docker/build-push-action@v5
        with:
          context: ./import
          push: true
          load: true
          tags: ghcr.io/MathisBurger/bundestag-explore-import:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          load: true
          tags: ghcr.io/MathisBurger/bundestag-explore-backend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max