# --- Qdrant Vector Engine Configuration ---
quarkus.langchain4j.qdrant.host=127.0.0.1
quarkus.langchain4j.qdrant.port=6334
quarkus.langchain4j.qdrant.use-grpc=true
quarkus.langchain4j.qdrant.collection.name=bundestag_collection

quarkus.langchain4j.qdrant.collection.vector-params.size=384
quarkus.langchain4j.qdrant.collection.vector-params.distance=Cosine

#quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}
#quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
#quarkus.langchain4j.openai.chat-model.temperature=0.2

quarkus.langchain4j.ollama.base-url=http://host.docker.internal:11434
quarkus.langchain4j.ollama.chat-model.model-name=llama3
quarkus.langchain4j.ollama.chat-model.temperature=0.2