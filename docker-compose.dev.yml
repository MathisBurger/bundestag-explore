version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: parlaments_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: parlaments_data
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9999:9000"
      - "9001:9001"
    environment:
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "admin1234567"
    volumes:
      - ./s3_data:/data
    command: server /data --address "0.0.0.0:9000" --console-address "0.0.0.0:9001"

volumes:
  mongo_data: