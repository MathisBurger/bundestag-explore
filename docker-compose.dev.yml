version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - qdrant_storage:/qdrant/storage:z
  mongodb:
    image: mongo:6.0
    container_name: parlaments_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: parlaments_data

volumes:
  mongo_data:
  qdrant_storage: